<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Port Scanner Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        select, input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid #334155;
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .error-box {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .results-header {
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }

        .port-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            font-family: monospace;
            font-size: 1.05rem;
        }

        .port-row:last-child {
            border-bottom: none;
        }

        .status-badge {
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .status-badge.open {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-badge.closed {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Port Scanner</h1>
        <div class="subtitle">Select or enter a target host to begin scanning for open ports.</div>

        <div class="error-box" id="errorBox"></div>

        <div class="card">
            <div class="form-group">
                <label for="serverProfile">Select Custom Server</label>
                <select id="serverProfile">
                  <p>-- Choose custom or managed server --</p>
                    <option value="yes">Custom Server</option>
                </select>
            </div>

            <div class="form-group">
                <label for="targetHost">Website URL or IP Address</label>
                <input type="text" id="targetHost" placeholder="e.g., scanme.nmap.org">
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="targetPorts">Ports to Scan (comma-separated)</label>
                    <input type="text" id="targetPorts" value="21, 22, 80, 443">
                </div>
                <div class="form-group" style="max-width: 150px;">
                    <label for="timeout">Timeout (s)</label>
                    <input type="number" id="timeout" value="1.0" step="0.5" min="0.5">
                </div>
            </div>

            <button id="scanBtn">Scan Ports</button>
        </div>

        <div class="card" id="resultsCard" style="display: none;">
            <div class="results-header" id="resultsTitle">Scan Results</div>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        const API_URL = "/api/scan";  

        const serverProfile = document.getElementById('serverProfile');
        const targetHost = document.getElementById('targetHost');
        const targetPorts = document.getElementById('targetPorts');
        const timeoutInput = document.getElementById('timeout');
        const scanBtn = document.getElementById('scanBtn');
        const errorBox = document.getElementById('errorBox');
        const resultsCard = document.getElementById('resultsCard');
        const resultsContent = document.getElementById('resultsContent');
        const resultsTitle = document.getElementById('resultsTitle');

        // Step 3a: Read from servers.json immediately upon browser load
        document.addEventListener('DOMContentLoaded', () => {
            fetch('servers.json')
                .then(res => {
                    if(!res.ok) throw new Error("Could not load local servers database configuration.");
                    return res.json();
                })
                .then(data => {
                    data.forEach(server => {
                        const opt = document.createElement('option');
                        opt.value = server.host;
                        opt.textContent = server.name;
                        opt.dataset.ports = server.default_ports;
                        serverProfile.appendChild(opt);
                    });
                })
                .catch(err => showError(err.message));
        });

        // Autofill matching data when user changes profile selector options
        serverProfile.addEventListener('change', (e) => {
            const selectedOption = e.target.options[e.target.selectedIndex];
            if(e.target.value) {
                targetHost.value = e.target.value;
                targetPorts.value = selectedOption.dataset.ports || "80,443";
            }
        });

        // Step 3b: Send payload data request to app.py Python Backend
        scanBtn.addEventListener('click', async () => {
            // Reset visibility views
            errorBox.style.display = 'none';
            resultsCard.style.display = 'none';
            resultsContent.innerHTML = '';
            
            const hostValue = targetHost.value.trim();
            if(!hostValue) {
                showError("Please enter or choose a valid website host domain target.");
                return;
            }

            scanBtn.disabled = true;
            scanBtn.textContent = "Scanning Target Network...";

            const payload = {
                host: hostValue,
                ports: targetPorts.value,
                timeout: parseFloat(timeoutInput.value)
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "An unexpected processing fault occurred in the backend application API.");
                }

                // Render out incoming scan data arrays
                resultsTitle.textContent = `Scan Results for ${data.host} (${data.ip})`;
                
                data.results.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'port-row';
                    
                    const portInfo = document.createElement('span');
                    portInfo.textContent = `Port ${item.port}`;
                    
                    const statusBadge = document.createElement('span');
                    statusBadge.className = `status-badge ${item.status.toLowerCase()}`;
                    statusBadge.textContent = item.status;
                    
                    row.appendChild(portInfo);
                    row.appendChild(statusBadge);
                    resultsContent.appendChild(row);
                });

                resultsCard.style.display = 'block';

            } catch (err) {
                showError(err.message);
            } finally {
                scanBtn.disabled = false;
                scanBtn.textContent = "Scan Ports";
            }
        });

        function showError(message) {
            errorBox.textContent = `Error: ${message}`;
            errorBox.style.display = 'block';
        }
    </script>
</body>
</html>
